```html
<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<title>Lista zadań</title>

<style>
body {
    font-family: Arial;
    background: #eef2f7;
    margin: 0;
    padding: 20px;
}

.container {
    max-width: 500px;
    margin: auto;
    background: white;
    padding: 20px;
    border-radius: 10px;
}

h1 {
    text-align: center;
}

input, select, button {
    padding: 10px;
    margin: 5px 0;
    width: 100%;
    box-sizing: border-box;
}

button {
    background: #4CAF50;
    color: white;
    border: none;
}

button:hover {
    background: #45a049;
}

ul {
    list-style: none;
    padding: 0;
}

li {
    background: #f9f9f9;
    margin: 5px 0;
    padding: 10px;
    display: flex;
    justify-content: space-between;
    border-radius: 5px;
}

.done {
    text-decoration: line-through;
    color: gray;
}

.buttons button {
    width: auto;
    margin-left: 5px;
    background: #ddd;
    color: black;
}

.buttons button:hover {
    background: #bbb;
}
</style>
</head>

<body>

<div class="container">
    <h1>Lista zadań</h1>

    <input id="taskInput" placeholder="Wpisz zadanie">
    <button id="addBtn">Dodaj</button>

    <select id="filter">
        <option value="all">Wszystkie</option>
        <option value="active">Aktywne</option>
        <option value="done">Zakończone</option>
    </select>

    <ul id="taskList"></ul>
</div>

<script>
// TABLICA NA ZADANIA
let tasks = [];

// POBIERANIE ELEMENTÓW
let input = document.getElementById("taskInput");
let addBtn = document.getElementById("addBtn");
let list = document.getElementById("taskList");
let filter = document.getElementById("filter");

// EVENTY
addBtn.addEventListener("click", addTask);
filter.addEventListener("change", showTasks);

// DODAWANIE ZADANIA
function addTask() {
    let text = input.value;

    if (text === "") return;

    let task = {
        id: Date.now(),
        text: text,
        done: false
    };

    tasks.push(task);

    saveData();
    showTasks();

    input.value = "";
}

// WYŚWIETLANIE
function showTasks() {
    list.innerHTML = "";

    let filtered = tasks;

    if (filter.value === "active") {
        filtered = tasks.filter(function(t) {
            return t.done === false;
        });
    }

    if (filter.value === "done") {
        filtered = tasks.filter(function(t) {
            return t.done === true;
        });
    }

    filtered.forEach(function(task) {
        let li = document.createElement("li");

        if (task.done === true) {
            li.classList.add("done");
        }

        let span = document.createElement("span");
        span.textContent = task.text;

        // klik = zakończ
        span.addEventListener("click", function() {
            toggleTask(task.id);
        });

        let btns = document.createElement("div");
        btns.className = "buttons";

        let doneBtn = document.createElement("button");
        doneBtn.textContent = "✔";
        doneBtn.addEventListener("click", function() {
            toggleTask(task.id);
        });

        let deleteBtn = document.createElement("button");
        deleteBtn.textContent = "X";
        deleteBtn.addEventListener("click", function() {
            deleteTask(task.id);
        });

        btns.appendChild(doneBtn);
        btns.appendChild(deleteBtn);

        li.appendChild(span);
        li.appendChild(btns);

        list.appendChild(li);
    });
}

// ZMIANA STATUSU
function toggleTask(id) {
    tasks.forEach(function(t) {
        if (t.id === id) {
            t.done = !t.done;
        }
    });

    saveData();
    showTasks();
}

// USUWANIE
function deleteTask(id) {
    tasks = tasks.filter(function(t) {
        return t.id !== id;
    });

    saveData();
    showTasks();
}

// LOCAL STORAGE
function saveData() {
    localStorage.setItem("tasks", JSON.stringify(tasks));
}

function loadData() {
    let data = localStorage.getItem("tasks");
    if (data) {
        tasks = JSON.parse(data);
    }
}

// START
loadData();
showTasks();
</script>

</body>
</html>
